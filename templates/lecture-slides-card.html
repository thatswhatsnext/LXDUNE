<style>
    .topic-dashboard { max-width:950px; margin:30px auto; font-family:Arial,sans-serif; color:#1F2A33; }
    .topic-dashboard h2 { margin:0 0 14px 0; }
    .topic-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; }
    .topic-card { padding:22px; border-radius:16px; text-decoration:none; color:#1F2A33; border:1px solid #dfe6ea; transition:transform 0.2s ease,box-shadow 0.2s ease; background:#ffffff; position:relative; }
    .topic-card:hover { transform:translateY(-6px); box-shadow:0 12px 24px rgba(0,0,0,0.08); }
    .topic-step { font-size:0.75em; font-weight:800; text-transform:uppercase; margin-bottom:6px; opacity:0.8; letter-spacing:.5px; }
    .topic-card h4 { margin:0 0 8px 0; }
    .topic-extra { font-size:0.9em; color:#444; margin-top:8px; line-height:1.5; }
    .topic-lecture { border-left:6px solid #1f6fb2; background:#ffffff; }
    .topic-slides { border-left:6px solid #25797F; background:#f4f6f8; }
    .topic-pill { display:inline-block; background:#eef5fb; border:1px solid #dfe6ea; border-radius:999px; padding:4px 10px; font-weight:800; font-size:.8em; margin-bottom:12px; }
    .topic-video { position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:10px; margin-top:12px; border:1px solid #dfe6ea; background:#ffffff; }
    .topic-video iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:0; }
</style>
<div class="topic-dashboard">
    <div class="topic-pill">EDSE357 • TOPIC 8</div>
    <h2>Topic 8 — Teaching with a diverse cohort</h2>
    <div class="topic-grid">
        <div class="topic-card topic-lecture">
            <div class="topic-step">Step 1</div>
            <h4>Watch the Lecture</h4>
            <div class="topic-extra">Click below to expand the lecture recording.</div>
            <details style="margin-top:10px;">
                <summary style="cursor:pointer; font-weight:800;">Open lecture recording</summary>
                <div class="topic-video">
                    <!-- Note: Echo360 iframes must use &amp; not & inside src attributes -->
                    <iframe src="{{ECHO360_URL}}" allowfullscreen="" frameborder="0"></iframe>
                </div>
            </details>
        </div>
        <a href="{{SLIDES_LINK}}" class="topic-card topic-slides" target="_blank" rel="noopener">
            <div class="topic-step">Step 2</div>
            <h4>View Slides (PDF)</h4>
            <div class="topic-extra">Open the presentation in a new window.</div>
        </a>
    </div>
</div>
